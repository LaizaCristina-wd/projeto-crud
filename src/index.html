<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto CRUD</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
 <body class="bg-light">
   <header class="bg-dark text-white text-center p-3">
   <h2>PHP/JS CRUD Project</h2>
    </header>

  <main class="container mt-4">

    <section class="card mb-4">
        <div class="card-body">
        <h3>Users</h3>
        <div id="usersList" class="row g-3">
        <p class="text-muted">No users found.</p>
        </div>
        </div>

      <div id="user-template" class="col-md-4 user-card">
       <div class="card h-100">
        <div class="card-body">

      <p class="user-name"></p>
      <p class="user-age"></p>
      <p class="user-email"></p>

        <button data-id="${user.id}" class="edit-btn btn btn-sm btn-secondary">Edit</button>
        <button id="delete-btn" class="delete-btn btn btn-sm btn-danger">Delete</button>
        </div>
      </div>
      </div>

      <div class="row"></div>
    </section>

    <section class="card">
      <div class="card-body">
          <h4 class="mb-3">Create User</h4>
          <form id="userForm" method="post">
          <div class="row">

              <div class="col">
              <label class="form-label">Name</label>
              <input type="text" name="name" class="user-name form-control" id="name">
              </div>

              <div class="col">
              <label  class="form-label">Age</label>
              <input type="number" name="age" class="user-age  form-control" id="age">
              </div>

              <div class="col">
              <label  class="form-label">Email</label>
              <input type="email" name="email" class="user-email  form-control" id="email">
              </div>

              <div class="col d-flex align-items-end">
              <button type="submit" class="btn btn-dark w-100">
                Create
              </button>
              </div>

          </div>
          </form>
      </div>
    </section>

  <section id="edit-user-card" class="card mt-4">
    <div class="card-body">

     <h4>Edit User</h4>

      <form id="edit-form">

      <div class="row mb-3">

        <div class="col">
          <label  class="form-label">Name</label>
          <input id="edit-name" class="form-control" type="text" placeholder="name">
        </div>

        <div class="col">
          <label  class="form-label">Age</label>
          <input id="edit-age" class="form-control" type="number" placeholder="age">
        </div>

        <div class="col">
          <label class="form-label">Email</label>
          <input id="edit-email" class="form-control" type="email" placeholder="email">
        </div>

      </div>

      <div class="d-flex gap-2">

        <button type="submit" class="btn btn-dark">
          Update
        </button>

        <button id="btnCancel" type="reset" class="btn btn-secondary">
          Cancel
        </button>

      </div>
    </form>
  </div>
</section>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

     <script type="module" src="app.js"></script>
   
 </body>
</html>
